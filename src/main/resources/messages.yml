config-version: 1

messages:
  prefix: "&8[&bWarps&8] "
  no-permission: "%prefix%&cNo tenés permiso para usar este comando."
  only-player: "%prefix%&cSolo los jugadores pueden usar este comando."
  unknown-command: "%prefix%&cComando desconocido. Usá &f/%command% help&c."
  help:
    header: "%prefix%&7Comandos disponibles:"
    lines:
      - "&b/%command% help &8- &fMuestra esta ayuda."
      - "&b/%command% set <name> &8- &fCrea un warp en tu ubicación."
      - "&b/%command% remove <warp> &8- &fElimina uno de tus warps."
      - "&b/%command% <warp> &8- &fTe teletransporta a un warp."
      - "&b/%command% list [page] [player] &8- &fMuestra los warps disponibles."
      - "&b/%command% amount [player] &8- &fMuestra la cantidad y el límite de warps."
      - "&b/%command% desc set <warp> <description> &8- &fDefine la descripción de un warp."
      - "&b/%command% lock <warp> [true/false] &8- &fBloquea o desbloquea un warp."
      - "&b/%command% reset <warp> &8- &fMueve un warp a tu ubicación actual."
      - "&b/%command% rename <warp> <name> &8- &fCambia el nombre de un warp."
      - "&b/%command% whitelist <enable|disable|add|remove|list> <warp> [player] &8- &fAdministra la lista de acceso."
      - "&b/%command% reload &8- &fRecarga la configuración y los mensajes."
