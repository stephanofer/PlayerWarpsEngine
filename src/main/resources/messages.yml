config-version: 1

messages:
  prefix: "&8[&bPlayerWarps&8] "
  no-permission: "%prefix%&cYou do not have permission to use this command."
  only-player: "%prefix%&cOnly players can use this command."
  unknown-command: "%prefix%&cUnknown command. Use &f/%command% help&c."
  help:
    header: "%prefix%&7Available commands:"
    lines:
      - "&b/%command% help &8- &fShow this help message."
      - "&b/%command% set <name> &8- &fCreate a warp at your location."
      - "&b/%command% remove <warp> &8- &fRemove one of your warps."
      - "&b/%command% <warp> &8- &fTeleport to a warp."
      - "&b/%command% list [page] [player] &8- &fList available warps."
      - "&b/%command% amount [player] &8- &fShow warp amount and limit."
      - "&b/%command% desc set <warp> <description> &8- &fSet a warp description."
      - "&b/%command% lock <warp> [true/false] &8- &fLock or unlock a warp."
      - "&b/%command% reset <warp> &8- &fMove a warp to your current location."
      - "&b/%command% rename <warp> <name> &8- &fRename a warp."
      - "&b/%command% whitelist <enable|disable|add|remove|list> <warp> [player] &8- &fManage whitelist."
      - "&b/%command% reload &8- &fReload configuration and messages."
  reload:
    success: "%prefix%&aConfiguration reloaded successfully."
    storage-restart-required: "%prefix%&eStorage settings changed. Restart the server to reconnect MySQL safely."
    failed: "%prefix%&cReload failed: &f%error%"
    invalid-command: "%prefix%&cReload failed because the configured command is invalid: &f%error%"
    config-error: "%prefix%&cReload failed because one or more configuration files are invalid."
  usage:
    set: "%prefix%&cUsage: &f/%command% set <name>"
    remove: "%prefix%&cUsage: &f/%command% remove <warp>"
    desc: "%prefix%&cUsage: &f/%command% desc set <warp> <description> &7or &f/%command% desc remove <warp>"
    list: "%prefix%&cUsage: &f/%command% list [page] [player]"
    amount: "%prefix%&cUsage: &f/%command% amount [player]"
    lock: "%prefix%&cUsage: &f/%command% lock <warp> [true/false]"
    reset: "%prefix%&cUsage: &f/%command% reset <warp>"
    rename: "%prefix%&cUsage: &f/%command% rename <warp> <name>"
    setowner: "%prefix%&cUsage: &f/%command% setowner <warp> <onlinePlayer>"
    whitelist: "%prefix%&cUsage: &f/%command% whitelist <enable|disable|add|remove|list> <warp> [onlinePlayer]"
    removeall: "%prefix%&cUsage: &f/%command% removeall <player>"
    addwarps: "%prefix%&cUsage: &f/%command% addwarps <onlinePlayer> <amount>"
    purge: "%prefix%&cUsage: &f/%command% purge unsafe [confirm] &7or &f/%command% purge inactive <days> [confirm]"
