size: 54
name: "&8Warps &7%page%/%maxPage%"
patterns:
  - "pwe_decoration"
  - "pwe_pagination"
items:
  warps:
    type: PWE_WARP_LIST
    slots:
      - "10-16"
      - "19-25"
      - "28-34"
      - "37-43"
    item:
      material: ENDER_PEARL
      name: "&b%warp%"
      lore:
        - "&7Dueño: &f%owner%"
        - "&7Visitas: &f%visits%"
        - "&7Estado: &f%locked% &8/ &f%whitelist%"
        - "&7Acceso: %access_status%"
        - ""
        - "&7%description%"
        - ""
        - "%access_action%"
        - "&eClic derecho &7para administrar si te pertenece."
  search:
    type: PWE_SEARCH
    isPermanent: true
    slot: 46
    item:
      material: SIGN
      name: "&bBuscar"
      lore:
        - "&7Actual: &f%query%"
        - ""
        - "&eClic izquierdo &7para buscar."
        - "&eClic derecho &7para borrar."
  scope:
    type: PWE_SCOPE
    isPermanent: true
    slot: 47
    item:
      material: COMPASS
      name: "&bVer: &f%scope%"
      lore:
        - "&7Alterná entre todos los warps"
        - "&7y tus propios warps."
  sort:
    type: PWE_FILTER_SORT
    isPermanent: true
    slot: 49
    item:
      material: HOPPER
      name: "&bOrdenar: &f%sort%"
      lore:
        - "&eClic izquierdo &7para el siguiente orden."
        - "&eClic derecho &7para el orden anterior."
  refresh:
    type: PWE_REFRESH
    isPermanent: true
    slot: 51
    item:
      material: WATCH
      name: "&bActualizar"
      lore:
        - "&7Actualizá esta vista desde la caché."
